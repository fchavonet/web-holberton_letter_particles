<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Holberton letter particles</title>

    <link rel="stylesheet" href="./styles.css">
    <script src="./behaviors.js" defer></script>
</head>

<body>
    <!-- Text input -->
    <input id="text-input" type="text" value="Holberton School">

    <!-- Settings menu -->
    <div id="settings-menu">
        <h2>Settings</h2>

        <!-- Color picker -->
        <label for="">Color:</label>
        <select name="" id="">
            <option value="red">Red</option>
            <option value="green">Green</option>
            <option value="blue">Blue</option>
        </select>

        <!-- Font size -->
        <label for="font-size">Font size:</label>
        <input id="font-size" type="range" min="50" max="190" step="10" value="120" list="font-size-ticks">
        <datalist id="font-size-ticks">
            <option value="50"></option>
            <option value="60"></option>
            <option value="70"></option>
            <option value="80"></option>
            <option value="90"></option>
            <option value="100"></option>
            <option value="110"></option>
            <option value="120"></option>
            <option value="130"></option>
            <option value="140"></option>
            <option value="150"></option>
            <option value="160"></option>
            <option value="170"></option>
            <option value="180"></option>
            <option value="190"></option>
        </datalist>

        <!-- Particle size -->
        <label for="particle-size">Particle size:</label>
        <input id="particle-size" type="range" min="3" max="9" step="1" value="6" list="particle-size-ticks">
        <datalist id="particle-size-ticks">
            <option value="3"></option>
            <option value="4"></option>
            <option value="5"></option>
            <option value="6"></option>
            <option value="7"></option>
            <option value="8"></option>
            <option value="9"></option>
        </datalist>

        <!-- Gap size -->
        <label for="gap-size">Gap size:</label>
        <input id="gap-size" type="range" min="0" max="6" step="1" value="3" list="gap-size-ticks">
        <datalist id="gap-size-ticks">
            <option value="0"></option>
            <option value="1"></option>
            <option value="2"></option>
            <option value="3"></option>
            <option value="4"></option>
            <option value="5"></option>
            <option value="6"></option>
        </datalist>
    </div>

    <!-- GitHub link -->
    <a id="github-link" href="https://github.com/fchavonet/web-holberton_letter_particles" target="_blank">
        <img id="github-icon" src="./assets/images/logo-github.webp" alt="GitHub icon">
    </a>

    <!-- Main canvas -->
    <canvas id="main-canvas"></canvas>
</body>

</html>
